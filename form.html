<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOOMOR - Creative</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Gochi+Hand&family=Inter:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --sky-bg: #A7E2FF; 
            --glass-blue: rgba(135, 206, 250, 0.6); 
            --white: #FFFFFF; 
            --red: #FF0000; 
            --dark: #0F172A;
        }

        body, html { 
            margin: 0; padding: 0; min-height: 100vh; 
            background: var(--sky-bg); 
            font-family: 'Gochi Hand', cursive; 
            display: flex; justify-content: center; align-items: center; 
            overflow-x: hidden;
        }
        
        .sky-scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .wind-streak { position: absolute; background: rgba(255,255,255,0.4); height: 3px; border-radius: 10px; animation: blow 4s linear infinite; }
        @keyframes blow { from { transform: translateX(-200px); opacity: 0; } 50% { opacity: 0.8; } to { transform: translateX(100vw); opacity: 0; } }

        /* --- المربع الأزرق السماوي الاحترافي --- */
        .glass-box { 
            position: relative; z-index: 10; 
            width: 85%; max-width: 500px; 
            background: var(--glass-blue);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            /* حدود بيضاء كأنها ظل ضوئي */
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 50px; 
            padding: 40px; 
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.1), 0 0 20px rgba(255,255,255,0.4);
            margin: 20px;
        }
        
        /* --- الخط الكرييتف اليدوي --- */
        .interactive-text { 
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(2.5rem, 8vw, 3.5rem); /* حجم مرن للموبايل والـ PC */
            color: var(--dark);
            margin-bottom: 20px;
            line-height: 1.2;
            text-shadow: 2px 2px 0px var(--white);
        }
        .interactive-text span { display: inline-block; cursor: pointer; transition: 0.2s; }
        .interactive-text span:hover { transform: scale(1.2) rotate(-5deg); color: var(--red); }
        
        .logo-main { width: clamp(80px, 20vw, 120px); margin-bottom: 20px; animation: bounce 3s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .step { display: none; }
        .step.active { display: block; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .btn-ct { 
            font-family: 'Permanent Marker', cursive; 
            font-size: clamp(3.5rem, 12vw, 5rem); 
            color: var(--red); cursor: pointer; 
        }
        
        input { 
            width: 100%; padding: 18px; border-radius: 25px; border: 3px solid var(--dark);
            background: var(--white); margin-bottom: 20px; box-sizing: border-box;
            font-family: 'Gochi Hand', cursive; font-size: 1.5rem; font-weight: bold;
            text-align: center; outline: none; transition: 0.3s;
        }
        input:focus { transform: scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .nav-link { 
            display: block; background: var(--dark); color: var(--white); 
            padding: 18px; border-radius: 25px; text-decoration: none; 
            font-family: 'Permanent Marker', cursive; font-size: 1.4rem;
            margin-bottom: 12px; transition: 0.3s; cursor: pointer;
            border: 2px solid transparent;
        }
        .nav-link:hover { 
            background: var(--white); color: var(--dark); 
            border-color: var(--dark); transform: translateY(-3px) rotate(1deg); 
        }
        .nav-link.done { background: #00C853; pointer-events: none; border: none; }

        .share-btn { background: #1DA1F2; color: white; margin-top: 20px; }
        .share-btn:hover { background: #0c85d0; }

        /* التنسيق للموبايل */
        @media (max-width: 480px) {
            .glass-box { padding: 30px 20px; border-radius: 35px; }
            .interactive-text { font-size: 2.2rem; }
        }

    </style>
</head>
<body>

    <div class="sky-scene" id="sky"></div>

    <div class="glass-box">
        <img src="G.png" class="logo-main" id="logo" alt="G">

        <div class="step active" id="p1">
            <div class="btn-ct interactive-text" onclick="to(2)">START!</div>
        </div>

        <div class="step" id="p2">
            <h2 class="interactive-text">Who R U?</h2>
            <input type="text" id="user" placeholder="Enter X Username" oninput="saveData()">
            <a class="nav-link" onclick="to(3)">GO NEXT -></a>
        </div>

        <div class="step" id="p3">
            <h2 class="interactive-text">Follow Us</h2>
            <a href="https://x.com/itsgloomor" target="_blank" class="nav-link" id="lk1" onclick="ok('lk1')">FOLLOW X</a>
            <a href="https://x.com/i/status/2038728622123425944" target="_blank" class="nav-link" id="lk2" onclick="ok('lk2')">LIKE & RT & COMMENT</a>
            <a class="nav-link" style="opacity:0.3; pointer-events: none;" id="btnNext1" onclick="to(4)">CONTINUE</a>
        </div>

        <div class="step" id="p4">
            <h2 class="interactive-text">PROOF</h2>
            <input type="text" id="proof" placeholder="Paste Comment Link" oninput="saveData()">
            <a class="nav-link" onclick="validateLink()">CHECK IT</a>
        </div>

        <div class="step" id="p5">
            <h2 class="interactive-text">WALLET</h2>
            <input type="text" id="evm" placeholder="0x... EVM Address" oninput="saveData()">
            <a class="nav-link" id="finalSubmit" onclick="send()">SUBMIT NOW</a>
        </div>

        <div class="step" id="p6">
            <h1 class="interactive-text" style="color:var(--red)">YOU'RE IN!</h1>
            <p style="font-size: 1.5rem;">Thanks! Never forget {FUCK ISRAEL}</p>
            <a href="https://twitter.com/intent/tweet?text=I%20just%20joined%20the%20GLOOMOR%20community!%20%40itsgloomor%20%23GLOOMOR" target="_blank" class="nav-link share-btn">SHARE ON X</a>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbympitbLtWNoWX1SsksIAiRARv0jo7pVZmBdC20_wWVIkucuvjW80AxlPktxzWdD4U0KQ/exec';

        function to(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('p' + step);
            if (target) {
                target.classList.add('active');
                splitText();
            }
        }

        function validateLink() {
            const link = document.getElementById('proof').value;
            if (/^https?:\/\/(www\.)?(x|twitter)\.com\/.+\/status\/\d+/.test(link)) {
                to(5);
            } else {
                alert("Yo! Paste a real X link!");
            }
        }

        let task1 = false, task2 = false;
        function ok(id) {
            const el = document.getElementById(id);
            el.classList.add('done');
            el.innerText = "DONE!";
            if(id === 'lk1') task1 = true;
            if(id === 'lk2') task2 = true;
            if(task1 && task2) {
                const n = document.getElementById('btnNext1');
                n.style.opacity = "1"; n.style.pointerEvents = "auto";
            }
        }

        function send() {
            const name = document.getElementById('user').value;
            const proof = document.getElementById('proof').value;
            const wallet = document.getElementById('evm').value;
            if(!name || !proof || !wallet) return alert("Fill everything!");
            
            const btn = document.getElementById('finalSubmit');
            btn.innerText = "SENDING...";
            btn.style.pointerEvents = "none";

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name, proof, wallet })
            }).then(() => to(6)).catch(() => {
                alert("Error! Try again.");
                btn.innerText = "SUBMIT NOW";
                btn.style.pointerEvents = "auto";
            });
        }

        function createWind() {
            const sky = document.getElementById('sky');
            for(let i=0; i<10; i++){
                let s = document.createElement('div');
                s.className = 'wind-streak';
                s.style.width = Math.random() * 100 + 50 + 'px';
                s.style.top = Math.random() * 100 + 'vh';
                s.style.animationDelay = Math.random() * 5 + 's';
                sky.appendChild(s);
            }
        }

        function splitText() {
            document.querySelectorAll('.interactive-text').forEach(el => {
                if (el.dataset.split === "true") return;
                let txt = el.innerText;
                el.innerHTML = txt.split('').map(char => `<span>${char === ' ' ? '&nbsp;' : char}</span>`).join('');
                el.dataset.split = "true";
            });
        }

        window.onload = () => { createWind(); splitText(); };
    </script>
</body>
</html>
