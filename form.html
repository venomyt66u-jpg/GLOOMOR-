<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOOMOR | WAVE 2 RESET</title>

    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Gochi+Hand&family=Inter:wght@900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg: #050505;
            --white: #FFFFFF; 
            --red: #FF0000; 
            --black: #000000;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
            box-sizing: border-box;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); 
            font-family: 'Gochi Hand', cursive; 
            overflow-x: hidden;
            color: var(--white);
        }

        /* ================= BACKGROUND ================= */
        .bg-container {
            position: fixed; inset: 0; z-index: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        .bg-row {
            font-family: 'Inter', sans-serif;
            font-size: clamp(40px, 8vw, 90px);
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            line-height: 0.8;
            filter: blur(3px);
            user-select: none;
            animation: moveRow 50s linear infinite;
        }

        .bg-row:nth-child(even) { animation-direction: reverse; color: rgba(255, 0, 0, 0.02); }

        @keyframes moveRow {
            from { transform: translateX(-30%); }
            to { transform: translateX(30%); }
        }

        /* ================= MODAL & UI ================= */
        #main {
            display: none; position: relative; z-index: 10;
            min-height: 100vh; padding: 20px; align-items: center; justify-content: center;
        }

        .white-box { 
            width: 100%; max-width: 480px; 
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px; padding: 40px 30px; 
            text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            color: var(--black);
        }

        .interactive-text { 
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(2rem, 6vw, 3rem); margin-bottom: 20px;
        }

        input { 
            width: 100%; padding: 18px; border: 2px solid #eee; border-radius: 20px;
            margin-bottom: 15px; font-family: 'Inter', sans-serif; text-align: center;
        }

        .nav-link { 
            display: block; background: var(--black); color: white; 
            padding: 18px; border-radius: 20px; margin-bottom: 10px;
            cursor: pointer; font-weight: bold; text-decoration: none;
            transition: 0.3s; font-family: 'Inter', sans-serif; border: none; width: 100%;
        }

        .nav-link:hover { background: var(--red); transform: translateY(-2px); }
        .nav-link.done { background: #00C853 !important; pointer-events: none; }
        .disabled { opacity: 0.2; pointer-events: none; filter: grayscale(1); }

        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.6s ease; }

        #custom-alert {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(8px);
        }

        .alert-content {
            background: #111; border: 2px solid var(--red); padding: 35px;
            border-radius: 30px; max-width: 400px; width: 85%; text-align: center;
            transform: translateY(20px); transition: 0.3s; opacity: 0;
        }

        .alert-content.show { transform: translateY(0); opacity: 1; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div class="bg-container" id="bgRows"></div>

    <div id="custom-alert">
        <div class="alert-content" id="alert-box">
            <h3 id="alert-title" style="color:red; font-family:'Permanent Marker'">ERROR</h3>
            <p id="alert-msg" style="color:white; font-family:'Inter'">Message here.</p>
            <button class="nav-link" onclick="closeAlert()" style="background:red">ACKNOWLEDGE</button>
        </div>
    </div>

    <div id="main">
        <div class="white-box">
            <h1 class="interactive-text">GLOOMOR</h1>

            <div class="step" id="p1">
                <p style="font-weight:bold; color:#666">WAVE 2 INITIATED</p>
                <button class="nav-link" onclick="saveTo(2)">GET STARTED</button>
            </div>

            <div class="step" id="p2">
                <h2 class="interactive-text" style="font-size:1.8rem">X IDENTITY</h2>
                <input type="text" id="username" placeholder="@Username">
                <button class="nav-link" onclick="validateStep2()">CONTINUE</button>
            </div>

            <div class="step" id="p3">
                <h2 class="interactive-text" style="font-size:1.8rem">REQUISITES</h2>
                <a href="https://x.com/itsgloomor" target="_blank" class="nav-link" id="tk1" onclick="task('tk1')">1. FOLLOW GLOOMOR</a>
                <a href="https://x.com/i/status/2039747695254872110" target="_blank" class="nav-link" id="tk2" onclick="task('tk2')">2. LIKE & RT POST</a>
                <a href="https://x.com/i/status/2039747695254872110" target="_blank" class="nav-link" id="tk3" onclick="task('tk3')">3. COMMENT WALLET</a>
                <button class="nav-link disabled" id="btn3" onclick="saveTo(4)">CONTINUE</button>
            </div>

            <div class="step" id="p4">
                <h2 class="interactive-text" style="font-size:1.8rem">VERIFICATION</h2>
                <p style="font-size:0.9rem">Paste your <b>Comment Link</b></p>
                <input type="text" id="proof" placeholder="https://x.com/status/...">
                <button class="nav-link" onclick="validateStep4()">VERIFY PROOF</button>
            </div>

            <div class="step" id="p5">
                <h2 class="interactive-text" style="font-size:1.8rem">REWARD</h2>
                <input type="text" id="wallet" placeholder="0x... EVM WALLET">
                <button class="nav-link" id="finalBtn" onclick="finish()">SUBMIT ACCESS</button>
            </div>

            <div class="step" id="p6">
                <h1 class="interactive-text" style="color:red">AUTHORIZED</h1>
                <p style="font-weight:bold">Wave 2 registration complete.<br>Data encrypted.</p>
            </div>

            <div class="step" id="pBlocked">
                <h1 class="interactive-text">LOCKED</h1>
                <p style="font-weight:bold">Previous entry detected.<br>Wait for next Wave.</p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. RESET LOGIC (For Wave 2) ---
        // بنعمل فحص لو دي أول مرة يفتح الـ Wave 2 بنصفر الـ LocalStorage القديم
        if (!localStorage.getItem('gloomor_wave2_reset')) {
            localStorage.removeItem('gloomor_done');
            localStorage.removeItem('gloomor_step');
            localStorage.setItem('gloomor_wave2_reset', 'true');
        }

        // --- 2. Background ---
        const bgRows = document.getElementById('bgRows');
        for(let i=0; i<30; i++) {
            const row = document.createElement('div');
            row.className = 'bg-row';
            row.innerText = "GLOOMOR GLOOMOR GLOOMOR GLOOMOR GLOOMOR ";
            row.style.animationDuration = (35 + Math.random() * 35) + "s";
            bgRows.appendChild(row);
        }

        // --- 3. Alert Logic ---
        function showAlert(title, message) {
            const modal = document.getElementById('custom-alert');
            const box = document.getElementById('alert-box');
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = message;
            modal.style.display = 'flex';
            setTimeout(() => box.classList.add('show'), 10);
        }

        function closeAlert() {
            const modal = document.getElementById('custom-alert');
            const box = document.getElementById('alert-box');
            box.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        // --- 4. App Logic ---
        let currentStep = localStorage.getItem('gloomor_step') || 1;
        const isFinished = localStorage.getItem('gloomor_done');
        let attemptCount = 0; 

        window.onload = () => {
            document.getElementById('main').style.display = 'flex';
            if(isFinished) showStep('Blocked');
            else showStep(currentStep);
        };

        function showStep(s) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            const target = document.getElementById('p' + s);
            if(target) target.classList.add('active');
        }

        function saveTo(s) {
            currentStep = s;
            localStorage.setItem('gloomor_step', s);
            showStep(s);
        }

        function validateStep2() {
            const u = document.getElementById('username').value.trim();
            if(u.length > 2) saveTo(3);
            else showAlert("IDENTITY ERROR", "Please enter your X handle.");
        }

        let tasks = { tk1: false, tk2: false, tk3: false };
        function task(id) {
            document.getElementById(id).classList.add('done');
            document.getElementById(id).innerText = "✓ COMPLETED";
            tasks[id] = true;
            if(tasks.tk1 && tasks.tk2 && tasks.tk3) {
                document.getElementById('btn3').classList.remove('disabled');
            }
        }

        function validateStep4() {
            const p = document.getElementById('proof').value.trim();
            if(!p.includes('x.com') && !p.includes('twitter.com')) {
                showAlert("INVALID LINK", "Please provide a valid link from X.");
                return;
            }
            if(attemptCount === 0) {
                attemptCount++;
                showAlert("SECURITY CHECK", "Please ensure you commented your wallet address on the post first.");
            } else {
                saveTo(5);
            }
        }

        async function finish() {
            const wallet = document.getElementById('wallet').value.trim();
            const user = document.getElementById('username').value.trim();
            const proof = document.getElementById('proof').value.trim();
            const btn = document.getElementById('finalBtn');

            if(!wallet.startsWith('0x') || wallet.length < 20) {
                showAlert("WALLET ERROR", "Invalid EVM wallet address.");
                return;
            }

            btn.innerText = "FUCK ISRAEL...";
            btn.classList.add('disabled');

            const scriptURL = 'https://script.google.com/macros/s/AKfycbympitbLtWNoWX1SsksIAiRARv0jo7pVZmBdC20_wWVIkucuvjW80AxlPktxzWdD4U0KQ/exec';
            const formData = new FormData();
            formData.append('username', user);
            formData.append('proof', proof);
            formData.append('wallet', wallet);

            try {
                await fetch(scriptURL, { method: 'POST', body: formData });
                localStorage.setItem('gloomor_done', 'true');
                saveTo(6);
            } catch (e) {
                localStorage.setItem('gloomor_done', 'true');
                saveTo(6);
            }
        }
    </script>
</body>
</html>
