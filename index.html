<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLOOMOR | Ultra Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');

        :root {
            --primary: #ffffff;
            --accent: #ff0000;
            --bg-black: #000000;
            --glass: rgba(255, 255, 255, 0.05);
            --transition-speed: 0.8s;
        }

        /* منع التحديد والمربعات الزرقاء */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            outline: none !important;
        }

        body {
            background-color: var(--bg-black);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: var(--primary);
            transition: background-color var(--transition-speed);
        }

        body.gloomor-active {
            background-color: #1a0000;
        }

        /* --- BACKGROUND WALL --- */
        .bg-container {
            position: fixed;
            inset: -20%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transform: rotate(-5deg);
            pointer-events: none;
            opacity: 0.12;
            transition: opacity 0.5s;
        }

        .bg-row {
            display: flex;
            white-space: nowrap;
            line-height: 0.6;
            will-change: transform;
        }

        .bg-row span {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(60px, 12vw, 120px);
            color: var(--primary);
            padding: 0 10px;
            text-transform: uppercase;
            transition: color var(--transition-speed);
        }

        .gloomor-active .bg-row span {
            color: var(--accent);
        }

        /* --- HEADER NAV --- */
        .header-nav {
            position: fixed;
            top: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .nav-inner {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 10px 25px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            font-weight: 700;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.5;
        }

        .nav-item:hover { opacity: 1; }

        /* GLOOMOR MODE BUTTON */
        .mode-btn {
            background: var(--primary);
            color: #000;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 10px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gloomor-active .mode-btn {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 20px var(--accent);
        }

        /* --- MAIN LOGO --- */
        .hero {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .it-is-gloomor {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2.5rem, 12vw, 9.5rem);
            text-transform: uppercase;
            line-height: 0.8;
            text-align: center;
            cursor: default;
        }

        .char {
            display: inline-block;
            transition: transform 0.3s, color 0.3s, text-shadow 0.3s;
            cursor: pointer;
            color: var(--primary);
        }

        .char:active {
            transform: scale(1.2) translateZ(50px);
            color: #fff;
            text-shadow: 0 0 50px #fff;
        }

        .gloomor-active .char {
            color: var(--accent);
        }

        .gloomor-active .char:active {
            color: #ff4d4d;
            text-shadow: 0 0 50px #ff0000;
        }

        /* --- MODALS --- */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            z-index: 200; display: none;
            justify-content: center; align-items: center;
            opacity: 0;
        }

        .modal-box {
            background: #fff; color: #000;
            width: 90%; max-width: 400px; padding: 40px;
            border-radius: 40px; text-align: center;
        }

        .gloomor-active .modal-box {
            background: #1a0000;
            color: #fff;
            border: 2px solid var(--accent);
        }

        .info-item {
            background: #f8f8f8; padding: 16px; border-radius: 20px;
            display: flex; justify-content: space-between; margin-bottom: 10px;
        }

        .gloomor-active .info-item { background: #330000; }
        .gloomor-active .info-value { color: var(--accent); }

        .x-icon-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 80px; height: 80px; background: #000; color: #fff;
            border-radius: 24px; margin-top: 10px; transition: 0.3s;
        }
        .gloomor-active .x-icon-btn { background: var(--accent); }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 20%, black 150%);
            z-index: 5; pointer-events: none;
        }
    </style>
</head>
<body id="body">

    <div class="vignette"></div>

    <nav class="header-nav">
        <div class="nav-inner">
            <div class="nav-item" onclick="openModal('community')">Community</div>
            <div class="mode-btn" onclick="toggleGloomorMode()">GLOOMOR MODE</div>
            <div class="nav-item" onclick="openModal('mint')">Mint</div>
        </div>
    </nav>

    <div class="bg-container" id="bg-wall"></div>

    <div class="hero">
        <h1 class="it-is-gloomor" id="main-title">
            </h1>
    </div>

    <div id="community" class="modal">
        <div class="modal-box">
            <h2 style="font-family:'Archivo Black'; margin-bottom:20px;">COMMUNITY</h2>
            <a href="https://x.com/itsGLOOMOR" target="_blank" class="x-icon-btn">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
            <div style="margin-top:20px; font-size:10px; cursor:pointer; opacity:0.5;" onclick="closeModal('community')">CLOSE</div>
        </div>
    </div>

    <div id="mint" class="modal">
        <div class="modal-box">
            <h2 style="font-family:'Archivo Black'; margin-bottom:20px;">MINT INFO</h2>
            <div class="info-item"><span style="font-size:10px; opacity:0.5;">SUPPLY</span><span class="info-value" style="font-weight:900;">2222</span></div>
            <div class="info-item"><span style="font-size:10px; opacity:0.5;">CHAIN</span><span class="info-value" style="font-weight:900;">ETH</span></div>
            <div class="info-item"><span style="font-size:10px; opacity:0.5;">PRICE</span><span class="info-value" style="font-weight:900;">TBA</span></div>
            <div class="info-item"><span style="font-size:10px; opacity:0.5;">DATE</span><span class="info-value" style="font-weight:900;">TBA</span></div>
            <div style="margin-top:20px; font-size:10px; cursor:pointer; opacity:0.5;" onclick="closeModal('mint')">CLOSE</div>
        </div>
    </div>

    <script>
        // تكسير النص إلى حروف تفاعلية
        const titleContainer = document.getElementById('main-title');
        const textContent = "IT'S GLOOMOR";
        titleContainer.innerHTML = textContent.split('').map(char => 
            char === ' ' ? '<br>' : `<span class="char">${char}</span>`
        ).join('');

        // توليد الخلفية
        const bgWall = document.getElementById('bg-wall');
        for(let i=0; i<25; i++) {
            const row = document.createElement('div');
            row.className = 'bg-row';
            row.innerHTML = `<span>GLOOMOR</span>`.repeat(12);
            bgWall.appendChild(row);
        }

        // تبديل الوضع (GLOOMOR MODE)
        let isGloomor = false;
        function toggleGloomorMode() {
            isGloomor = !isGloomor;
            document.body.classList.toggle('gloomor-active');
            
            // انميشن اهتزاز عند التفعيل
            if(isGloomor) {
                gsap.to(".hero", { x: 5, y: 5, duration: 0.05, repeat: 10, yoyo: true });
                gsap.to(".bg-container", { opacity: 0.3, duration: 0.3 });
            } else {
                gsap.to(".bg-container", { opacity: 0.12, duration: 0.3 });
            }
        }

        // أنيميشن الخلفية
        gsap.to(".bg-row:nth-child(even)", { xPercent: -30, duration: 25, repeat: -1, yoyo: true, ease: "none" });
        gsap.to(".bg-row:nth-child(odd)", { xPercent: 30, duration: 25, repeat: -1, yoyo: true, ease: "none" });

        // بارالاكس
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 60;
            const y = (e.clientY / window.innerHeight - 0.5) * 60;
            gsap.to("#bg-wall", { x: x, y: y, duration: 2 });
        });

        // النوافذ
        function openModal(id) {
            const m = document.getElementById(id);
            m.style.display = 'flex';
            gsap.to(m, { opacity: 1, duration: 0.4 });
        }

        function closeModal(id) {
            const m = document.getElementById(id);
            gsap.to(m, { opacity: 0, duration: 0.3, onComplete: () => m.style.display = 'none' });
        }
    </script>
</body>
</html>
